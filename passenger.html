<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tur Yolcu Paneli – Canlı Takip</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #030712;
      --sidebar-bg: rgba(17, 24, 39, 0.82);
      --card-bg: rgba(17, 24, 39, 0.72);
      --card-hover: rgba(25, 36, 60, 0.95);
      --border: rgba(255, 255, 255, 0.06);
      --text: #f9fafb;
      --text-muted: #94a3b8;
      --accent: #60a5fa;
      --accent-glow: rgba(96, 165, 250, 0.38);
      --glass: rgba(15, 23, 42, 0.58);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --danger: #ff4d4f;
      --success: #00d084;
      --neutral: #94a3b8;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top center, rgba(37,99,235,0.10), transparent 30%), linear-gradient(180deg, #020617 0%, #030712 100%);
      color: var(--text);
    }
    body { overflow-x: hidden; overflow-y: auto; }
    .app { display: flex; height: 100vh; position: relative; }
    .sidebar {
      width: 400px; min-width: 400px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 100;
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }
    .sidebar-header { padding: 32px 24px 24px; border-bottom: 1px solid var(--border); }
    .tour-name {
      font-size: 1.5rem; font-weight: 800; margin: 0;
      background: linear-gradient(to right, #fff, #9ba3af);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 24px; }
    .timeline { position: relative; padding-left: 20px; border-left: 2px solid var(--border); }
    .day-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px; margin-bottom: 20px;
      cursor: pointer; transition: 0.25s ease;
    }
    .day-card:hover { background: var(--card-hover); transform: translateY(-2px); }
    .day-card.active { border-color: var(--accent); background: rgba(59,130,246,0.12); box-shadow: 0 0 0 1px rgba(96,165,250,0.25); }
    .main { flex: 1; position: relative; background: #000; }
    #map { width: 100%; height: 100%; }
    .overlay-info {
      position: absolute; top: 24px; left: 24px; width: 340px; padding: 24px;
      background: rgba(15,23,42,0.64); backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-lg);
      z-index: 1000; opacity: 0; transform: translateY(-20px);
      transition: 0.45s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .overlay-info.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .bottom-nav {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; padding: 12px 20px;
      background: var(--glass); border-radius: 50px; z-index: 1000; border: 1px solid var(--border);
    }
    .city-photo {
      width: 100%; height: 180px; border-radius: var(--radius-md);
      position: relative; overflow: hidden; margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .city-photo div { position: absolute; inset: 0; background-size: cover; background-position: center; transition: opacity 1.5s ease-in-out; }
    .photo-back { opacity: 0; }
    .photo-front { opacity: 1; }
    .travel-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); }
    .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 1rem; font-weight: 700; color: var(--accent); }
    .weather-badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
      background: rgba(255,255,255,0.08); border-radius: 20px; font-size: 0.8rem; font-weight: 600;
      margin-top: 10px; border: 1px solid var(--border);
    }
    .theme-palette { position: absolute; top: 80px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
    .theme-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--glass); backdrop-filter: blur(10px);
      border: 1px solid var(--border); color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s;
    }
    .theme-btn:hover { background: var(--accent); }
    .search-container { margin-bottom: 10px; width: 100%; position: relative; }
    .search-input {
      width: 100%; padding: 11px 18px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 999px; color: #fff; outline: none; font-size: 0.95rem;
    }
    .search-input::placeholder { color: #7c8aa5; }
    .search-input:focus { border-color: rgba(96,165,250,0.35); box-shadow: 0 0 0 4px rgba(96,165,250,0.08); }

    /* Custom red location pin marker */
    .location-pin-marker {
      display: flex; align-items: flex-end; justify-content: center;
      width: 28px; height: 36px;
    }
    .location-pin-marker svg { width: 28px; height: 36px; }
    .location-pin-marker.selected svg { filter: drop-shadow(0 0 8px rgba(255,60,60,0.9)); transform: scale(1.25); }

    .loader {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 1s infinite linear;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 var(--accent-glow); }
      70% { box-shadow: 0 0 0 15px rgba(59,130,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    }
    .fun-fact-card {
      position: absolute; bottom: 100px; right: 24px; width: 300px; padding: 20px;
      background: rgba(15,23,42,0.7); backdrop-filter: blur(20px);
      border: 1px solid var(--accent); border-radius: var(--radius-md);
      z-index: 1000; opacity: 0; transform: translateX(50px);
      transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .fun-fact-card.visible { opacity: 1; transform: translateX(0); }

    /* Selection screen */
    #selectionScreen {
      position: relative; min-height: 100vh; background: transparent;
      z-index: 2000; display: flex; flex-direction: column; overflow: visible;
    }
    #worldMapSection {
      display: none; min-height: 44vh; height: 44vh;
      background: linear-gradient(135deg, #10203a 0%, #091120 100%);
      position: relative; overflow: hidden; border-bottom: 1px solid var(--border);
    }
    #weeklyMap { width: 100%; height: 100%; }
    .weekly-map-overlay {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to bottom, rgba(3,7,18,0.18), rgba(3,7,18,0.05) 35%, rgba(3,7,18,0.42));
      z-index: 500;
    }
    .weekly-map-title {
      position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
      z-index: 700; text-align: center; width: calc(100% - 40px); pointer-events: none;
    }
    .weekly-map-title h2 {
      font-size: 1.8rem; font-weight: 800; margin: 0;
      background: linear-gradient(to right, #60a5fa, #fff);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .weekly-map-title p { color: var(--text-muted); margin-top: 8px; font-size: 0.92rem; }
    /* Ana sayfa haritası: büyüyüp küçülen kırmızı pin */
    .weekly-pin-wrap {
      width: 28px; height: 36px;
      display: flex; align-items: flex-end; justify-content: center;
      transform-origin: bottom center;
    }
    .weekly-pin-wrap svg { width: 28px; height: 36px; display: block; }
    @keyframes pinPulseA {
      0%   { transform: scale(1);    opacity: 0.92; }
      35%  { transform: scale(1.45); opacity: 1;    }
      65%  { transform: scale(0.72); opacity: 0.6;  }
      100% { transform: scale(1);    opacity: 0.92; }
    }
    @keyframes pinPulseB {
      0%   { transform: scale(0.85); opacity: 0.7;  }
      30%  { transform: scale(1.3);  opacity: 1;    }
      60%  { transform: scale(1.55); opacity: 0.85; }
      85%  { transform: scale(0.9);  opacity: 0.65; }
      100% { transform: scale(0.85); opacity: 0.7;  }
    }
    @keyframes pinPulseC {
      0%   { transform: scale(1.2);  opacity: 1;    }
      45%  { transform: scale(0.65); opacity: 0.55; }
      75%  { transform: scale(1.4);  opacity: 0.9;  }
      100% { transform: scale(1.2);  opacity: 1;    }
    }
    @keyframes pinPulseD {
      0%   { transform: scale(0.9);  opacity: 0.8;  }
      20%  { transform: scale(1.5);  opacity: 1;    }
      55%  { transform: scale(1.1);  opacity: 0.75; }
      80%  { transform: scale(0.7);  opacity: 0.5;  }
      100% { transform: scale(0.9);  opacity: 0.8;  }
    }
    #tourSelectionContent {
      flex: 1; display: none; flex-direction: column; align-items: center;
      padding: 24px 20px 32px; overflow: visible;
    }
    .selection-header {
      max-width: 1200px; width: 100%; text-align: center; padding-bottom: 12px;
      position: sticky; top: 0; z-index: 50;
      background: linear-gradient(180deg, rgba(3,7,18,0.96) 0%, rgba(3,7,18,0.90) 75%, rgba(3,7,18,0) 100%);
      backdrop-filter: blur(8px);
    }

    /* Logo + title */
    .ejder-logo-img {
      height: 32px; width: auto; object-fit: contain; display: block;
      margin: 0 auto 10px;
      filter: brightness(1.05) contrast(1.02);
    }
    .selection-header h1 {
      font-size: 1.7rem; margin: 0 0 4px; font-weight: 800; letter-spacing: -0.02em;
    }
    .selection-header .subtitle {
      color: var(--text-muted); margin: 0 0 14px; font-size: 0.82rem;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .subtitle-divider {
      width: 24px; height: 1px; background: rgba(255,255,255,0.15); display: inline-block;
    }
    .selection-header p { color: var(--text-muted); margin: 0 0 14px; font-size: 0.9rem; }
    #tourGrid {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px; width: 100%; max-width: 1200px; padding: 10px 6px 40px; overflow: visible;
    }
    .tour-section-title { grid-column: 1 / -1; display: flex; align-items: center; gap: 14px; margin-top: 30px; margin-bottom: 6px; }
    .tour-section-dot {
      width: 34px; height: 34px; border-radius: 999px;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.18), 0 0 24px rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .tour-section-dot.red { background: radial-gradient(circle at 30% 30%, #ff8a8a, #ff3355 70%); }
    .tour-section-dot.green { background: radial-gradient(circle at 30% 30%, #9cffc5, #00d084 70%); }
    .tour-section-dot.gray { background: radial-gradient(circle at 30% 30%, #d7dde8, #6b7280 70%); }
    .tour-section-title h2 { margin: 0; font-size: 1.1rem; font-weight: 800; }
    .tour-section-title .count { color: var(--text-muted); font-size: 0.95rem; margin-left: 4px; }
    .tour-card {
      background: linear-gradient(180deg, rgba(13,23,44,0.92), rgba(11,18,32,0.92));
      border: 1px solid rgba(255,255,255,0.06); border-radius: 22px; padding: 20px;
      text-align: left; min-height: 154px; transition: 0.25s ease; cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }
    .tour-card:hover { transform: translateY(-3px); border-color: rgba(96,165,250,0.20); background: linear-gradient(180deg, rgba(16,28,52,0.96), rgba(11,18,32,0.96)); }
    .tour-card-title { font-size: 1rem; line-height: 1.35; font-weight: 800; margin-bottom: 14px; color: #fff; }
    .tour-card-meta { display: flex; align-items: center; gap: 8px; color: #b4c0d3; font-size: 0.78rem; margin-bottom: 8px; }
    .tour-card-meta:last-child { margin-bottom: 0; }
    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 50px 20px; color: var(--text-muted);
      border: 1px dashed rgba(255,255,255,0.08); border-radius: 22px; background: rgba(255,255,255,0.02);
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
    ::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.72); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(96,165,250,0.92); }
    @media (max-width: 1180px) { #tourGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 768px) {
      #worldMapSection { height: 36vh; min-height: 260px; }
      .selection-header h1 { font-size: 2.1rem; }
      #tourGrid { grid-template-columns: 1fr; }
      #tourSelectionContent { padding: 34px 16px 36px; }
    }
  </style>
</head>

            <div class="stat-label">Toplam Yol</div>
            <div class="stat-value" id="ovTotalDist">- km</div>
          </div>
        </div>
      </div>
      <div class="bottom-nav">
        <button id="btnPrev" style="background:none;border:none;color:#fff;cursor:pointer;">◀</button>
        <button id="btnAutoplay" style="background:var(--accent);border:none;color:#fff;padding:8px 16px;border-radius:30px;cursor:pointer;font-weight:600;font-size:1.1rem;">✈️</button>
        <button id="btnNext" style="background:none;border:none;color:#fff;cursor:pointer;">▶</button>
      </div>
      <div class="fun-fact-card" id="funFactCard">
        <div style="font-size:0.7rem;color:var(--accent);text-transform:uppercase;font-weight:700;letter-spacing:1px;margin-bottom:8px;">Biliyor muydunuz?</div>
        <div id="funFactText" style="font-size:0.9rem;line-height:1.5;"></div>
      </div>
    </main>
  </div>

  <script>
  (function () {
    const API_URL = "https://ejdervip.com/api/tours";
    let map = null, markers = [], polyline = null;
    let weeklyMap = null, weeklyMarkers = [], weeklyPolyline = null;
    let tour = null, selectedIdx = 0, autoplayInterval = null;

    const FUN_FACTS = {
      'Seul': 'Seul, dünyanın en hızlı internetine ve tek bir şehirdeki en büyük metro hattına sahip şehirlerinden biridir.',
      'Tokyo': 'Dünyanın en kalabalık metropolü olan Tokyo\u2019da, her gün milyonlarca kişi metro sistemini kullanır.',
      'Kyoto': 'Kyoto, Japonya\u2019nın en güçlü tarihî dokusunu taşıyan şehirlerinden biridir.',
      'Hiroşima': 'Hiroşima bugün dünya barışının en önemli sembollerinden biridir.',
      'Fuji': 'Fuji Dağı, Japonya\u2019nın en ikonik doğal simgelerinden biridir.',
      'İstanbul': 'İstanbul, dünyada iki kıta üzerine kurulu en önemli metropollerden biridir.',
      'Singapur': 'Singapur, dünyanın en yeşil şehirlerinden biridir.'
    };

    function redPinSVG(selected) {
      const scale = selected ? 'scale(1.25)' : 'scale(1)';
      const glow = selected ? 'filter:drop-shadow(0 0 8px rgba(220,30,30,0.95));' : '';
      return `<div class="location-pin-marker ${selected ? 'selected' : ''}" style="${glow}">
        <svg viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform:${scale};transition:transform 0.3s;">
          <path d="M14 0C8.477 0 4 4.477 4 10c0 7.5 10 22 10 22s10-14.5 10-22C24 4.477 19.523 0 14 0z" fill="#E53E3E"/>
          <path d="M14 0C8.477 0 4 4.477 4 10c0 7.5 10 22 10 22s10-14.5 10-22C24 4.477 19.523 0 14 0z" fill="url(#pinGrad)" opacity="0.6"/>
          <circle cx="14" cy="10" r="4.5" fill="white" opacity="0.92"/>
          <defs>
            <radialGradient id="pinGrad" cx="35%" cy="25%" r="75%">
              <stop offset="0%" stop-color="#FF8080"/>
              <stop offset="100%" stop-color="#8B0000"/>
            </radialGradient>
          </defs>
        </svg>
      </div>`;
    }

    function parseDate(dateStr) {
      if (!dateStr) return null;
      if (typeof dateStr === 'string' && dateStr.includes('.')) {
        const [day, month, year] = dateStr.split('.');
        return new Date(year, month - 1, day);
      }
      return new Date(dateStr);
    }
    function formatDate(date) { return date.toLocaleDateString('tr-TR'); }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
      return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function updateWeather() {
      const icons = ['☀️','⛅','☁️','🌧️'];
      const temp = Math.floor(Math.random()*11)+18;
      document.getElementById('ovWeather').innerHTML = `${icons[Math.floor(Math.random()*icons.length)]} ${temp}°C`;
    }

    function showFunFact(city) {
      const card = document.getElementById('funFactCard');
      document.getElementById('funFactText').textContent = FUN_FACTS[city] || `${city}, tur programındaki önemli destinasyonlardan biridir.`;
      card.classList.add('visible');
      setTimeout(() => card.classList.remove('visible'), 5000);
    }

    function initWeeklyMap() {
      if (weeklyMap) { weeklyMap.remove(); }
      weeklyMap = L.map('weeklyMap', { zoomControl: false, attributionControl: false }).setView([25, 20], 2);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(weeklyMap);
    }

    function displayWeeklyLocations(days) {
      if (!weeklyMap) initWeeklyMap();
      weeklyMarkers.forEach(m => weeklyMap.removeLayer(m));
      weeklyMarkers = [];
      if (weeklyPolyline) { weeklyMap.removeLayer(weeklyPolyline); weeklyPolyline = null; }

      const activeText = document.getElementById('activeCountriesText');
      const points = [];
      const countries = new Set();

      days.forEach((day, index) => {
        if (!isFinite(day.lat) || !isFinite(day.lng)) return;
        if (day.country) countries.add(day.country);
        points.push([day.lat, day.lng]);
        const anims   = ['pinPulseA','pinPulseB','pinPulseC','pinPulseD'];
        const durs    = [2.8, 3.5, 2.2, 4.1, 3.0, 2.6, 3.8];
        const delays  = [0, 0.9, 1.7, 0.4, 2.3, 1.1, 2.8, 0.6, 3.2, 1.5];
        const anim    = anims[index % anims.length];
        const dur     = durs[index % durs.length];
        const delay   = delays[index % delays.length];
        const pinHtml = `<div class="weekly-pin-wrap" style="animation:${anim} ${dur}s ease-in-out ${delay}s infinite; transform-origin: bottom center;">
          <svg viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 0C8.477 0 4 4.477 4 10c0 7.5 10 22 10 22s10-14.5 10-22C24 4.477 19.523 0 14 0z" fill="#E53E3E"/>
            <path d="M14 0C8.477 0 4 4.477 4 10c0 7.5 10 22 10 22s10-14.5 10-22C24 4.477 19.523 0 14 0z" fill="url(#wg)" opacity="0.55"/>
            <circle cx="14" cy="10" r="4.5" fill="white" opacity="0.92"/>
            <defs><radialGradient id="wg" cx="35%" cy="25%" r="75%"><stop offset="0%" stop-color="#FF9090"/><stop offset="100%" stop-color="#7B0000"/></radialGradient></defs>
          </svg>
        </div>`;
        const icon = L.divIcon({ className: '', html: pinHtml, iconSize: [28,36], iconAnchor: [14,36] });
        const marker = L.marker([day.lat, day.lng], { icon }).addTo(weeklyMap).bindTooltip(day.city || day.country || 'Durak', { permanent: false });
        weeklyMarkers.push(marker);
      });

      if (countries.size) {
        activeText.textContent = `${Array.from(countries).join(', ')} · ${countries.size} ülke`;
      } else {
        activeText.textContent = 'Bu hafta aktif tur bulunmuyor';
      }

      // Ana sayfa haritasında çizgi YOK — sadece pinler
      if (points.length >= 2) {
        const bounds = L.latLngBounds(points);
        weeklyMap.fitBounds(bounds, { padding: [40,40] });
      } else if (points.length === 1) {
        weeklyMap.setView(points[0], 5);
      } else {
        weeklyMap.setView([25, 20], 2);
      }
    }

    window.toggleMap = function(type) {
      let url = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
      if (type === 'sat') url = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
      if (type === 'light') url = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
      map.eachLayer(layer => { if (layer instanceof L.TileLayer) map.removeLayer(layer); });
      L.tileLayer(url, { attribution: '© OpenStreetMap' }).addTo(map);
    }

    async function initApp() {
      const tourId = new URLSearchParams(window.location.search).get('tourId');
      if (tourId) {
        try {
          const res = await fetch(`${API_URL}/${tourId}`);
          if (res.ok) { tour = await res.json(); startTourView(); return; }
        } catch(e) { console.error("Veri hatası", e); }
      }
      loadAllTours();
    }

    async function loadAllTours(query = '') {
      try {
        const res = await fetch(API_URL);
        const tours = await res.json();
        showSelection(tours, query);
      } catch(e) { console.error("Bağlantı hatası"); }
    }

    function showSelection(tours, filter = '') {
      const grid = document.getElementById('tourGrid');
      const content = document.getElementById('tourSelectionContent');
      const worldMapSection = document.getElementById('worldMapSection');
      const mainLoader = document.getElementById('mainLoader');

      mainLoader.style.display = 'none';
      content.style.display = 'flex';
      worldMapSection.style.display = 'block';
      grid.innerHTML = '';

      const query = filter.toLowerCase().trim();
      const now = new Date();
      now.setHours(0,0,0,0);

      const weekStart = new Date(now);
      const dayOfWeek = weekStart.getDay();
      const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
      weekStart.setDate(weekStart.getDate() + mondayOffset);
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekStart.getDate() + 6);
      weekEnd.setHours(23,59,59,999);

      const pastTours = [], currentTours = [], futureTours = [], weeklyDays = [];

      tours.forEach(t => {
        if (!t.days || t.days.length === 0) return;
        if (!t.name || !t.name.toLowerCase().includes(query)) return;

        const firstDay = t.days[0];
        const lastDay = t.days[t.days.length-1];
        const startDate = parseDate(firstDay.date);
        const endDate = parseDate(lastDay.date);
        if (!startDate || !endDate) return;

        // Tüm tarihleri gün başına normalize et — timezone sorunlarını önler
        const startDay = new Date(startDate); startDay.setHours(0,0,0,0);
        const endDay   = new Date(endDate);   endDay.setHours(23,59,59,999);

        const normalizedDays = t.days.map(day => ({ ...day, lat: Number(day.lat), lng: Number(day.lng) }));
        const tourData = { ...t, days: normalizedDays, startDate, endDate, dateText: `${formatDate(startDate)} - ${formatDate(endDate)}` };

        normalizedDays.forEach(day => {
          const dayDate = parseDate(day.date);
          if (dayDate && dayDate >= weekStart && dayDate <= weekEnd) weeklyDays.push(day);
        });

        // Bugün başlayan tur "Devam Eden"e düşer (startDay === now da dahil)
        if (endDay < now) {
          pastTours.push(tourData);
        } else if (startDay <= now) {
          currentTours.push(tourData);
        } else {
          futureTours.push(tourData);
        }
      });

      pastTours.sort((a,b) => b.startDate - a.startDate);
      currentTours.sort((a,b) => a.startDate - b.startDate);
      futureTours.sort((a,b) => a.startDate - b.startDate);

      initWeeklyMap();
      displayWeeklyLocations(weeklyDays);

      const createSection = (title, tours, dotClass, color) => {
        if (!tours.length) return;
        const section = document.createElement('div');
        section.className = 'tour-section-title';
        section.innerHTML = `<div class="tour-section-dot ${dotClass}"></div><h2 style="color:${color}">${title}</h2><span class="count">(${tours.length})</span>`;
        grid.appendChild(section);
        tours.forEach(t => {
          const card = document.createElement('div');
          card.className = 'tour-card';
          card.innerHTML = `
            <div class="tour-card-title">${t.name}</div>
            <div class="tour-card-meta"><span>🗓️</span><span>${t.dateText}</span></div>
            <div class="tour-card-meta"><span>⏱️</span><span>${t.days.length} Gün</span></div>
          `;
          card.onclick = () => window.location.search = `?tourId=${t.id}`;
          grid.appendChild(card);
        });
      };

      createSection('Devam Eden Turlar', currentTours, 'red', '#ff4d4f');
      createSection('Gelecek Turlar', futureTours, 'green', '#00d084');
      createSection('Geçmiş Turlar', pastTours, 'gray', '#cbd5e1');

      if (!pastTours.length && !currentTours.length && !futureTours.length) {
        grid.innerHTML = '<div class="empty-state">Aramanıza uygun tur bulunamadı</div>';
      }
    }

    function initMap() {
      if (map) return;
      map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20,0], 2);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    }

    function renderTimeline() {
      const c = document.getElementById('timeline');
      c.innerHTML = '';
      tour.days.forEach((day, idx) => {
        const card = document.createElement('div');
        card.className = `day-card ${idx === selectedIdx ? 'active' : ''}`;
        card.innerHTML = `
          <div style="font-size:0.72rem;color:var(--accent);font-weight:700;margin-bottom:6px;">${day.date || `Gün ${idx+1}`}</div>
          <div style="font-size:1rem;font-weight:700;margin-bottom:8px;">${day.city || day.title || 'Durak'}</div>
          <div style="font-size:0.85rem;color:var(--text-muted);line-height:1.4;">${day.activity || day.description || ''}</div>
        `;
        card.onclick = () => selectDay(idx);
        c.appendChild(card);
      });
    }

    function renderSelectedOnMap() {
      markers.forEach(m => m && map.removeLayer(m));
      markers = [];
      if (polyline) { map.removeLayer(polyline); polyline = null; }

      // Tur detay sayfasında rota çizgisi VAR
      const pts = tour.days.filter(d => isFinite(d.lat) && isFinite(d.lng)).map(d => [d.lat, d.lng]);
      if (pts.length >= 2) {
        polyline = L.polyline(pts, { color: '#3b82f6', weight: 3, opacity: 0.85, dashArray: '6, 10' }).addTo(map);
      }

      tour.days.forEach((day, idx) => {
        if (!isFinite(day.lat) || !isFinite(day.lng)) return;
        const isSelected = idx === selectedIdx;
        const pinIcon = L.divIcon({
          className: '',
          html: redPinSVG(isSelected),
          iconSize: [28, 36],
          iconAnchor: [14, 36],
          popupAnchor: [0, -36]
        });
        markers[idx] = L.marker([day.lat, day.lng], { icon: pinIcon }).addTo(map).on('click', () => selectDay(idx));
      });

      const selected = tour.days[selectedIdx];
      if (selected && isFinite(selected.lat) && isFinite(selected.lng)) {
        map.setView([selected.lat, selected.lng], 6);
      }
    }

    function selectDay(idx) { selectedIdx = idx; updateView(); }

    function updateView() {
      renderTimeline();
      renderSelectedOnMap();

      const day = tour.days[selectedIdx];
      const prev = selectedIdx > 0 ? tour.days[selectedIdx-1] : null;

      document.getElementById('tourTitle').textContent = tour.name || 'Tur Adı';
      document.getElementById('tourDateRange').textContent = tour.dateText || '';
      document.getElementById('ovDayNum').textContent = day.date || `Gün ${selectedIdx+1}`;
      document.getElementById('ovTitle').textContent = day.city || day.title || 'Durak';
      document.getElementById('ovDesc').textContent = day.activity || day.description || '';
      document.getElementById('photoFront').style.backgroundImage = `url('${day.photoUrl || day.photo || "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80"}')`;
      document.getElementById('photoBack').style.backgroundImage = `url('${day.photoUrl || day.photo || "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80"}')`;
      updateWeather();

      let dist = 0;
      if (prev && isFinite(prev.lat) && isFinite(prev.lng) && isFinite(day.lat) && isFinite(day.lng)) {
        dist = getDistance(prev.lat, prev.lng, day.lat, day.lng);
      }
      document.getElementById('ovDist').textContent = `${dist} km`;
      document.getElementById('ovTotalDist').textContent = `${selectedIdx === 0 ? 0 : dist} km`;
      document.getElementById('overlayInfo').classList.add('visible');
      if (day.city) showFunFact(day.city);
    }

    function startTourView() {
      document.getElementById('selectionScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'flex';
      tour.days = tour.days.map(d => ({ ...d, lat: Number(d.lat), lng: Number(d.lng) }));
      const startDate = parseDate(tour.days[0]?.date);
      const endDate = parseDate(tour.days[tour.days.length-1]?.date);
      if (startDate && endDate) tour.dateText = `${formatDate(startDate)} - ${formatDate(endDate)}`;
      initMap();
      updateView();
      document.getElementById('btnPrev').onclick = () => { selectedIdx = selectedIdx > 0 ? selectedIdx-1 : tour.days.length-1; updateView(); };
      document.getElementById('btnNext').onclick = () => { selectedIdx = selectedIdx < tour.days.length-1 ? selectedIdx+1 : 0; updateView(); };
      document.getElementById('btnAutoplay').onclick = () => {
        if (autoplayInterval) { clearInterval(autoplayInterval); autoplayInterval = null; return; }
        autoplayInterval = setInterval(() => { selectedIdx = selectedIdx < tour.days.length-1 ? selectedIdx+1 : 0; updateView(); }, 3000);
      };
    }

    document.getElementById('tourSearch').addEventListener('input', (e) => loadAllTours(e.target.value));
    initApp();
  })();
  </script>
</body>
</html>
